kube-prometheus-stack:

  grafana:
    adminPassword: admin
    service:
      type: NodePort
      nodePort: 30080
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 300m
        memory: 512Mi
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        isDefault: false

  prometheus:
    prometheusSpec:
      retention: 10d
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
      storageSpec: {}

  alertmanager:
    alertmanagerSpec:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi

  # etcd metrics inaccessible sur la plupart des clusters managés
  kubeEtcd:
    enabled: false

  # Docker Desktop ne supporte pas le montage shared/slave de /
  nodeExporter:
    enabled: false

loki:
  fullnameOverride: loki
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    storage:
      type: filesystem
    pattern_ingester:
      enabled: false

  singleBinary:
    replicas: 1
    persistence:
      # Le chart ne fallback pas sur emptyDir si désactivé,
      # et readOnlyRootFilesystem empêche /var/loki d'être écrit.
      # Petit PVC suffit pour le scope du projet.
      enabled: true
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 512Mi

  # Désactiver les composants non utilisés en mode SingleBinary
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  gateway:
    enabled: false
  test:
    enabled: false
  lokiCanary:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

promtail:
  fullnameOverride: promtail

  config:
    clients:
      - url: http://loki:3100/loki/api/v1/push

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
