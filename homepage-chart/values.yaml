replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

image:
  repository: ghcr.io/gethomepage/homepage
  tag: latest
  pullPolicy: IfNotPresent  

service:
  type: NodePort
  port: 3000
  nodePort: 30007

serviceAccount:
  create: true
  name: homepage

allowedHosts: "$(MY_POD_IP):3000,localhost:30007"

resources:
  requests:
    cpu: 50m
    memory: 200Mi
  limits:
    cpu: 300m
    memory: 256Mi

probes:
  liveness:
    initialDelaySeconds: 5
    periodSeconds: 15
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10

bookmarks: |
  ---
  # For configuration options and examples:
  # https://gethomepage.dev/configs/bookmarks

  - Transports & Réservations:
      - 12Go Asia:
          - abbr: 12G
            href: https://12go.asia/
      - Agoda:
          - abbr: AG
            href: https://www.agoda.com/
      - Booking:
          - abbr: BK
            href: https://www.booking.com/

  - Utilitaires:
      - Convertisseur EUR/THB:
          - abbr: THB
            href: https://www.xe.com/currencyconverter/convert/?Amount=1&From=EUR&To=THB
      - Google Translate:
          - abbr: GT
            href: https://translate.google.com/?sl=auto&tl=th&op=translate


customCss: |
  #page_wrapper {
    background:
      radial-gradient(circle at 10% 14%, rgba(125, 211, 252, 0.30) 0%, transparent 16%),
      radial-gradient(circle at 18% 78%, rgba(6, 182, 212, 0.18) 0%, transparent 20%),
      radial-gradient(circle at 32% 36%, rgba(56, 189, 248, 0.12) 0%, transparent 18%),
      radial-gradient(circle at 84% 12%, rgba(96, 165, 250, 0.24) 0%, transparent 18%),
      radial-gradient(circle at 76% 64%, rgba(59, 130, 246, 0.18) 0%, transparent 24%),
      radial-gradient(circle at 58% 88%, rgba(14, 165, 233, 0.14) 0%, transparent 24%),
      radial-gradient(circle at 50% 110%, rgba(8, 145, 178, 0.16) 0%, transparent 30%),
      linear-gradient(120deg, rgba(255, 255, 255, 0.050) 0%, transparent 30%),
      linear-gradient(300deg, rgba(56, 189, 248, 0.060) 10%, transparent 34%),
      linear-gradient(200deg, rgba(14, 165, 233, 0.040) 18%, transparent 42%),
      linear-gradient(145deg, #020617 0%, #081120 22%, #0f172a 48%, #111827 74%, #172554 100%);
    background-attachment: fixed;
    background-color: #020617;
  }


customJs: |
  console.log("Homepage custom JS loaded");


