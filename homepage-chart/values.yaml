velero:
  enabled: true
  schedule: "0 2 * * *"
  ttl: 720h

replicaCount: 1

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

image:
  repository: ghcr.io/gethomepage/homepage
  tag: latest
  pullPolicy: IfNotPresent  

service:
  type: NodePort
  port: 3000
  nodePort: 30007

serviceAccount:
  create: true
  name: homepage

allowedHosts: "$(MY_POD_IP):3000,localhost:30007"

resources:
  requests:
    cpu: 50m
    memory: 200Mi
  limits:
    cpu: 300m
    memory: 256Mi

probes:
  liveness:
    initialDelaySeconds: 1
    periodSeconds: 5
  readiness:
    initialDelaySeconds: 1
    periodSeconds: 5

