apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-custom-css
data:
  custom.css: |
    #page_wrapper {
      background:
        radial-gradient(circle at 10% 14%, rgba(125, 211, 252, 0.30) 0%, transparent 16%),
        radial-gradient(circle at 18% 78%, rgba(6, 182, 212, 0.18) 0%, transparent 20%),
        radial-gradient(circle at 32% 36%, rgba(56, 189, 248, 0.12) 0%, transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(96, 165, 250, 0.24) 0%, transparent 18%),
        radial-gradient(circle at 76% 64%, rgba(59, 130, 246, 0.18) 0%, transparent 24%),
        radial-gradient(circle at 58% 88%, rgba(14, 165, 233, 0.14) 0%, transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(8, 145, 178, 0.16) 0%, transparent 30%),
        linear-gradient(120deg, rgba(255, 255, 255, 0.050) 0%, transparent 30%),
        linear-gradient(300deg, rgba(56, 189, 248, 0.060) 10%, transparent 34%),
        linear-gradient(200deg, rgba(14, 165, 233, 0.040) 18%, transparent 42%),
        linear-gradient(145deg, #020617 0%, #081120 22%, #0f172a 48%, #111827 74%, #172554 100%);
      background-attachment: fixed;
      background-color: #020617;
    }

    /* Titre sur sa propre ligne, météo en dessous */
    #information-widgets {
      flex-wrap: wrap !important;
      row-gap: 0.5rem;
    }

    #information-widgets > *:first-child {
      flex-basis: 100% !important;
      flex-direction: column;
    }

    #widgets-wrap > * {
      text-align: start;
      align-self: flex-start;
    }

    #widgets-wrap .widget-container:last-child {
      translate: 0 25px;
    }

    #information-widgets-right {
      margin: 0;
      width: 100%;
    }

    #information-widgets-right form {
      width: 100%;
      max-width : 200px; 
      margin-left: auto;
    }

    .information-widget-datetime {
      margin-right: 20px;
    }

    .service-card, .bookmark-card {
      border: 1px solid rgba(251, 191, 36, 0.20) !important;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .service-card:hover, .bookmark-card:hover {
      border-color: rgba(251, 191, 36, 0.55) !important;
      box-shadow: 0 0 14px rgba(251, 191, 36, 0.08);
    }
