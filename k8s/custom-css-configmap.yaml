apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-custom-css
data:
  custom.css: |
    #page_wrapper {
      background:
        radial-gradient(circle at 10% 14%, rgba(125, 211, 252, 0.30) 0%, transparent 16%),
        radial-gradient(circle at 18% 78%, rgba(6, 182, 212, 0.18) 0%, transparent 20%),
        radial-gradient(circle at 32% 36%, rgba(56, 189, 248, 0.12) 0%, transparent 18%),
        radial-gradient(circle at 84% 12%, rgba(96, 165, 250, 0.24) 0%, transparent 18%),
        radial-gradient(circle at 76% 64%, rgba(59, 130, 246, 0.18) 0%, transparent 24%),
        radial-gradient(circle at 58% 88%, rgba(14, 165, 233, 0.14) 0%, transparent 24%),
        radial-gradient(circle at 50% 110%, rgba(8, 145, 178, 0.16) 0%, transparent 30%),
        linear-gradient(120deg, rgba(255, 255, 255, 0.050) 0%, transparent 30%),
        linear-gradient(300deg, rgba(56, 189, 248, 0.060) 10%, transparent 34%),
        linear-gradient(200deg, rgba(14, 165, 233, 0.040) 18%, transparent 42%),
        linear-gradient(145deg, #020617 0%, #081120 22%, #0f172a 48%, #111827 74%, #172554 100%);
      background-attachment: fixed;
      background-color: #020617;
    }
