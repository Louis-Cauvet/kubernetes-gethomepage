apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-widgets
data:
  widgets.yaml: |
    ---
    # For configuration options and examples, please see:
    # https://gethomepage.dev/configs/info-widgets/
    - resources:
        cpu: true
        memory: true
        disk: /
    - search:
        provider: google
        showSearchSuggestions: true 
        target: _blank