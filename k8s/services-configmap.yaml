apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-services
data:
  services.yaml: |
    ---
    # For configuration options and examples:
    # https://gethomepage.dev/configs/services/

    - Planification & Guide:
      - Notion Itinéraire:
          href: https://notion.so/
          description: "Notre itinéraire détaillé jour par jour"
          icon: notion
      - Google Maps:
          href: https://maps.google.com/
          description: "Cartes et lieux sauvegardés"
          icon: google-maps

    - Découverte:
      - Lonely Planet Thaïlande:
          href: https://www.lonelyplanet.com/thailand
          description: "Guides et recommandations"
      - TripAdvisor:
          href: https://www.tripadvisor.fr/Tourism-g293915-Thailand-Vacations.html
          description: "Activités, restaurants et avis"